<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Ticket Submission</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1e3a8a 0%, #6366f1 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        padding: 32px;
        max-width: 540px;
        width: 100%;
    }
    h1 {
        color: #1e3a8a;
        margin-bottom: 8px;
        font-size: 28px;
    }
    .subtitle {
        color: #6b7280;
        margin-bottom: 24px;
        font-size: 14px;
    }
    label {
        display: block;
        margin-top: 16px;
        margin-bottom: 6px;
        color: #374151;
        font-weight: 600;
        font-size: 14px;
    }
    input, textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 15px;
        font-family: inherit;
        transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
        outline: none;
        border-color: #6366f1;
    }
    textarea {
        resize: vertical;
        min-height: 120px;
    }
    button {
        margin-top: 20px;
        width: 100%;
        background: #6366f1;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
    }
    .result {
        margin-top: 20px;
        padding: 16px;
        border-radius: 8px;
        display: none;
    }
    .result.success {
        background: #ecfdf5;
        border: 1px solid #10b981;
        display: block;
    }
    .result.error {
        background: #fef2f2;
        border: 1px solid #ef4444;
        display: block;
    }
    .result h3 {
        margin-bottom: 8px;
        color: #047857;
    }
    .result.error h3 { color: #b91c1c; }
    .triage-detail {
        margin-top: 8px;
        font-size: 14px;
        color: #374151;
    }
    .triage-detail strong {
        color: #1f2937;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.5px;
    }
    .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        margin-left: 4px;
    }
    .badge.low { background: #d1fae5; color: #065f46; }
    .badge.medium { background: #fef3c7; color: #92400e; }
    .badge.high { background: #fed7aa; color: #9a3412; }
    .badge.urgent { background: #fecaca; color: #991b1b; }
    .loading {
        text-align: center;
        padding: 16px;
        color: #6366f1;
        font-weight: 600;
        display: none;
    }
    .loading.show { display: block; }
</style>
</head>
<body>
<div class="container">
    <h1>🎫 IT Support Ticket</h1>
    <p class="subtitle">Submit a ticket and watch AI triage it in real-time</p>

    <label for="submitter">Your Name (optional)</label>
    <input type="text" id="submitter" placeholder="e.g. Sarah from Marketing">

    <label for="ticket">Describe your issue</label>
    <textarea id="ticket" placeholder="e.g. My laptop won't connect to wifi after the update, I have a meeting in 20 minutes..."></textarea>

    <button id="submitBtn" onclick="submitTicket()">Submit Ticket</button>

    <div class="loading" id="loading">⏳ Claude is analyzing your ticket...</div>

    <div class="result" id="result"></div>
</div>

<script>
const API_URL = 'https://0hvcu6r2tc.execute-api.us-east-1.amazonaws.com/default/ticket-triager';

async function submitTicket() {
    const ticket = document.getElementById('ticket').value.trim();
    const submitter = document.getElementById('submitter').value.trim();
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');

    if (!ticket) {
        alert('Please describe your issue first');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Submitting...';
    loading.classList.add('show');
    result.style.display = 'none';
    result.className = 'result';

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticket: ticket, submitter: submitter || null })
        });

        const data = await response.json();
        loading.classList.remove('show');

        if (data.success && data.triage) {
            const t = data.triage;
            result.className = 'result success';
            result.innerHTML = `
                <h3>✅ Ticket Submitted &amp; Triaged</h3>
                <div class="triage-detail">
                    <strong>Category:</strong> ${t.category.replace(/_/g, ' ')}
                </div>
                <div class="triage-detail">
                    <strong>Priority:</strong>
                    <span class="badge ${t.priority}">${t.priority}</span>
                </div>
                <div class="triage-detail" style="margin-top:12px;">
                    <strong>Summary:</strong><br>${t.summary}
                </div>
                <div class="triage-detail" style="margin-top:12px;">
                    <strong>Drafted Response:</strong><br>${t.suggested_response}
                </div>
                <div class="triage-detail" style="margin-top:12px; color:#6b7280; font-size:12px;">
                    Posted to Discord ✓
                </div>
            `;
        } else {
            result.className = 'result error';
            result.innerHTML = `<h3>❌ Error</h3><p>${data.error || 'Something went wrong'}</p>`;
        }
    } catch (err) {
        loading.classList.remove('show');
        result.className = 'result error';
        result.innerHTML = `<h3>❌ Network Error</h3><p>${err.message}</p>`;
    }

    btn.disabled = false;
    btn.textContent = 'Submit Another Ticket';
}
</script>
</body>
</html>
